[filesystem.mounts.project_skills]
virtual = "/skills/project"
path = "config/skills"
supervisor_access = "read-only"
subagent_access = "read-only"
index = false

[filesystem.mounts.user_skills]
virtual = "/skills/user"
path = "~/.config/macllm/skills"
supervisor_access = "read-only"
subagent_access = "read-only"
index = false

[filesystem.mounts.agent_skills]
virtual = "/skills/agents"
path = "~/.agents/skills"
supervisor_access = "read-only"
subagent_access = "read-only"
index = false

[api_keys]
openai = ""
inception = ""
brave = ""
gemini = ""

